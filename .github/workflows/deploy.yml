# Bandmate — Deploy to GitHub Pages + FTP
#
# On every push to main this workflow:
#   1. Generates config.js from secrets at runtime
#   2. Deploys to GitHub Pages
#   3. Deploys to your FTP server
#
# REQUIRED SECRETS (repo Settings → Secrets and variables → Actions):
#   BANDMATE_SUPABASE_URL   — e.g. https://xxxx.supabase.co
#   BANDMATE_SUPABASE_KEY   — your Supabase anon/public key
#   BANDMATE_MAPS_KEY       — your Google Maps API key
#   FTP_SERVER              — your domain or FTP host (e.g. ftp.yourdomain.com)
#   FTP_USERNAME            — your FTP username
#   FTP_PASSWORD            — your FTP password
#   FTP_SERVER_DIR          — remote path, e.g. /public_html/ (include trailing slash)

name: Deploy Bandmate

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate config.js from GitHub Secrets
        env:
          SUPABASE_URL: ${{ secrets.BANDMATE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.BANDMATE_SUPABASE_KEY }}
          MAPS_KEY: ${{ secrets.BANDMATE_MAPS_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os
          url  = os.environ['SUPABASE_URL']
          key  = os.environ['SUPABASE_KEY']
          maps = os.environ['MAPS_KEY']
          with open('config.js', 'w') as f:
              f.write(
                  "// Auto-generated at deploy time by GitHub Actions.\n"
                  "// Do NOT commit credentials — add them to repo Secrets instead.\n"
                  f"const BANDMATE_SUPABASE_URL = '{url}';\n"
                  f"const BANDMATE_SUPABASE_KEY = '{key}';\n"
                  f"const BANDMATE_MAPS_KEY     = '{maps}';\n"
                  "const BANDMATE_DEV          = false;\n"
              )
          print('config.js written successfully.')
          PYEOF

      - name: Upload site artifact (for GitHub Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            .vscode/**
            supabase/.temp/**

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
