# Bandmate — Deploy to GitHub Pages (staging)
#
# GitHub Pages = staging/dev. Production = manual FTP via VS Code SFTP extension.
#
# REQUIRED SECRETS (repo Settings → Secrets and variables → Actions):
#   BANDMATE_SUPABASE_URL   — e.g. https://xxxx.supabase.co
#   BANDMATE_SUPABASE_KEY   — your Supabase anon/public key
#   BANDMATE_MAPS_KEY       — your Google Maps API key

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate config.js from GitHub Secrets
        env:
          SUPABASE_URL: ${{ secrets.BANDMATE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.BANDMATE_SUPABASE_KEY }}
          MAPS_KEY: ${{ secrets.BANDMATE_MAPS_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os
          url  = os.environ['SUPABASE_URL']
          key  = os.environ['SUPABASE_KEY']
          maps = os.environ['MAPS_KEY']
          with open('config.js', 'w') as f:
              f.write(
                  "// Auto-generated at deploy time by GitHub Actions.\n"
                  "// Do NOT commit credentials — add them to repo Secrets instead.\n"
                  f"const BANDMATE_SUPABASE_URL = '{url}';\n"
                  f"const BANDMATE_SUPABASE_KEY = '{key}';\n"
                  f"const BANDMATE_MAPS_KEY     = '{maps}';\n"
                  "const BANDMATE_DEV          = false;\n"
              )
          print('config.js written successfully.')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
